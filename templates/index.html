<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 Page Not Found</title>
    <style>
        /*--------------------
        Body
        --------------------*/
        html, body {
            height: 100vh;
            width: 100vw;
            margin: 0;
            padding: 0;
            font-family: Roboto, sans-serif;
            background: linear-gradient(0deg, #202239, #8595AC);
            overflow: hidden;
        }

        ::selection {
            background: #CDD4DE;
        }

        /*--------------------
        Centered Page
        --------------------*/
        .page {
            position: absolute;
            top: 0%;
            left: 0%;
            transform: translate(0%, 0%);
            width: 100%;
            height: 100%;
            z-index: 1;
            background: #0D0C1E;
            overflow: hidden;
            box-shadow: 0 5px 15px rgba(0, 0, 0, .3);
            text-align: center;
            color: #020a35;
        }

        /*--------------------
        Content
        --------------------*/
        .content {
            padding-top: 120px;
        }

        .content h1 {
            font-weight: 900;
            font-size: 165px;
            line-height: 1;
            margin-bottom: -10px;
            opacity: 0.6;
        }

        .content h2 {
            font-weight: 700;
            font-size: 34px;
            margin-bottom: 6px;
            opacity: 0.9;
        }

        .content p {
            font-weight: 300;
            font-size: 14px;
            opacity: 0.7;
            margin-bottom: 40px;
        }

        .content a {
            display: inline-block;
            font-weight: 300;
            font-size: 12px;
            text-transform: uppercase;
            border: 1px solid #CDD4DE;
            padding: 8px 14px;
            border-radius: 4px;
            opacity: 0.8;
            color: #7b1afa;
            text-decoration: none;
            transition: 0.3s;
        }

        .content a:hover {
            opacity: 1;
            background: rgba(255, 255, 255, 0.1);
        }

        /*--------------------
        Background Image
        --------------------*/
        .bg-image {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: auto;
            z-index: -1;
            transform: scale(1);
            transition: transform 0.1s linear;
        }
    </style>
</head>
<body>
    <div class="page">
        <div class="content">
            <h1>404</h1>
            <h2>Page Not Found</h2>
            <p>I tried to catch some fog, but I mist</p>
        </div>
        <img src="http://www.supah.it/dribbble/008/008.jpg" class="bg-image" />
    </div>

    <script>
        const bgImage = document.querySelector('.bg-image');
        let lFollowX = 0, lFollowY = 0, x = 0, y = 0;
        const friction = 1 / 30;

        function animate() {
            x += (lFollowX - x) * friction;
            y += (lFollowY - y) * friction;

            bgImage.style.transform = `translate(${x}px, ${y}px) scale(1.1)`;

            requestAnimationFrame(animate);
        }

        window.addEventListener('mousemove', e => {
            const lMouseX = Math.max(-100, Math.min(100, window.innerWidth / 2 - e.clientX));
            const lMouseY = Math.max(-100, Math.min(100, window.innerHeight / 2 - e.clientY));
            lFollowX = (20 * lMouseX) / 100;
            lFollowY = (10 * lMouseY) / 100;
        });

        animate();
    </script>
</body>
</html>
