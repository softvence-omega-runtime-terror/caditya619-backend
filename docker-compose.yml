services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: backend-api
    env_file:
      - .env
    ports:
      - "3002:8000"   # HOST:CONTAINER
    volumes:
      - /home/quikle/media:/app/media
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - redis

volumes:
  redis_data:
