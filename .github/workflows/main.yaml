name: Deployment with Continuous Integration & Continuous Deployment (CI/CD)

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  backend:
    name: Backend (FastAPI) Build & Test
    runs-on: ubuntu-latest
#    defaults:
#      run:
#        working-directory: backend
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

  deploy:
    name: 🚀 Deploy Backend
    runs-on: ubuntu-latest
    needs: [backend]
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup SSH Agent
        uses: webfactory/ssh-agent@v0.9.1
        with:
          ssh-private-key: ${{ secrets.QUIKLE_DEPLOY_KEY }}

      - name: Test SSH Connection
        run: |
          ssh -o StrictHostKeyChecking=no ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} "echo ✅ Connected to VPS!"

      - name: Pull latest changes & deploy
        env:
          DEPLOY_GITHUB_PAT: ${{ secrets.DEPLOY_GITHUB_PAT }}
        run: |
          ssh -o StrictHostKeyChecking=no ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} << EOF
            set -e
            echo "🚀 Starting deployment on VPS..."

            cd ~/quikle

            echo "🔄 Checking for local changes..."
            git fetch origin main
            if ! git diff --quiet; then
              echo "⚠️ Local changes detected. Stashing them..."
              git stash
            fi

            echo "⬇️ Pulling latest code..."
            git remote set-url origin https://moynul2k3:$DEPLOY_GITHUB_PAT@github.com/softvence-omega-runtime-terror/caditya619-backend.git
            git pull origin main

            echo "🐳 Rebuilding Docker containers..."
            docker-compose down
            docker-compose up -d --build

            echo "🏃 Running Aerich migrations..."
            docker compose exec -T backend-api aerich migrate --name auto --auto || true

            echo "📦 Applying migrations..."
            if ! docker compose exec -T backend-api aerich upgrade; then
              echo "⚠️ Real upgrade failed. Trying fake upgrade..."
              docker compose exec -T backend-api aerich upgrade --fake || true
            fi


            echo "✅ Deployment & migrations completed successfully!"
          EOF