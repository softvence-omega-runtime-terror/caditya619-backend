name: Deployment with Continuous Integration & Continuous Deployment (CI/CD)

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  backend:
    name: Backend (FastAPI) Build & Test
    runs-on: ubuntu-latest
#    defaults:
#      run:
#        working-directory: backend
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

  deploy:
    name: 🚀 Deploy Backend
    runs-on: ubuntu-latest
    needs: [ backend ]
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build Docker image
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/quikle-backend:latest .

      - name: Push Docker image
        run: |
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/quikle-backend:latest

      - name: Setup SSH Agent
        uses: webfactory/ssh-agent@v0.9.1
        with:
          ssh-private-key: ${{ secrets.QUIKLE_DEPLOY_KEY }}

      - name: Deploy on VPS
        run: |
          ssh -o StrictHostKeyChecking=no ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} << 'EOF'
            set -e
            echo "🚀 Pulling latest Docker image..."
            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/quikle-backend:latest

            echo "🐳 Recreating containers..."
            docker-compose down
            docker-compose up -d

            echo "🏃 Running migrations..."
            docker compose exec -T backend-api aerich migrate --name auto --auto || true
            if ! docker compose exec -T backend-api aerich upgrade; then
              docker compose exec -T backend-api aerich upgrade --fake || true
            fi

            echo "✅ Deployment completed!"
          EOF