services:
  api:
    build:
      context: .
    image: ${IMAGE_NAMESPACE:-moynul2k3}/caditya-backend:${IMAGE_TAG:-latest}
    container_name: caditya_api
    network_mode: host
    env_file:
      - .env
    environment:
      ENV: ${ENV:-production}
      DB_ENGINE: ${DB_ENGINE:-mysql}
      DB_HOST: ${DB_HOST:-127.0.0.1}
      DB_PORT: ${DB_PORT:-3306}
      DB_NAME: ${DB_NAME:-quikle}
      DB_USER: ${DB_USER:-moynul}
      DB_PASSWORD: ${DB_PASSWORD:-moynul}
      AUTO_GENERATE_SCHEMAS: "false"
      SEED_DUMMY_DATA: "false"
      WEB_CONCURRENCY: 1
    volumes:
      - ./media:/app/media
    restart: always
    healthcheck:
      test: [ "CMD-SHELL", "curl -fsS http://127.0.0.1:8000/healthz > /dev/null || exit 1" ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 45s
